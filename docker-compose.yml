version: '3.8'

services:

  db:
    image: postgres:16

    container_name: postgres-db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: sumdb

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .

    container_name: sum-app-container

    ports:
      - "5000:5000"

    depends_on:
      - db

volumes:
  postgres_data: