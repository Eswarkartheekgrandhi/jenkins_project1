<!DOCTYPE html>
<html>
<head>
    <title>Calculation History</title>
</head>
<body>

<h2>Calculation History</h2>

<a href="/">
    Back
</a>

<br><br>

<table border="1">

<tr>
    <th>ID</th>
    <th>Num1</th>
    <th>Num2</th>
    <th>Result</th>
    <th>Created At</th>
</tr>

{% for row in rows %}
<tr>
    <td>{{ row[0] }}</td>
    <td>{{ row[1] }}</td>
    <td>{{ row[2] }}</td>
    <td>{{ row[3] }}</td>
    <td>{{ row[4] }}</td>
</tr>
{% endfor %}

</table>

</body>
</html>
